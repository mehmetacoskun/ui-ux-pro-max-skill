<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="flutter_todo">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>flutter_todo</title>
  <link rel="manifest" href="manifest.json">

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        // flutter_service_worker.js kaydi
        navigator.serviceWorker.register('flutter_service_worker.js').then(function (reg) {
          // Yeni bir worker bulundugunda
          reg.onupdatefound = function () {
            var installingWorker = reg.installing;
            installingWorker.onstatechange = function () {
              if (installingWorker.state === 'installed') {
                if (navigator.serviceWorker.controller) {
                  // Yeni versiyon hazir, skipWaiting gondererek aktif et
                  console.log('New version installed. Activating...');
                  installingWorker.postMessage({type: 'SKIP_WAITING'});
                }
              }
            };
          };
        });

        // Worker degistiginde (yeni versiyon aktif oldugunda) sayfayi yenile
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (refreshing) return;
          refreshing = true;
          console.log('Controller changed. Reloading page...');
          window.location.reload();
        });

        // Her acilista guncelleme kontrolu yap
        navigator.serviceWorker.getRegistration().then(function (reg) {
          if (reg) reg.update();
        });
      });
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
